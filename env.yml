# env.yml — reproducible CPU/GPU environment (Python 3.11, CUDA 12.2)
name: niro
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy=1.26.4        # NumPy 2 currently breaks HF Datasets
  - pip
  - pip:
      - torch==2.3.0+cu122          # or +cpu on Mac; same version everywhere
      - torchvision==0.18.0+cu122
      - torchaudio==2.3.0+cu122
      - transformers==4.41.0
      - datasets==2.19.0
      - accelerate==0.29.3
      - onnxruntime-gpu==1.18.0     # CPU users: onnxruntime==1.18.0
      - rich==13.7.1                # nicer CLI progress / logging
